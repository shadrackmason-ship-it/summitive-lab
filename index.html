<!DOCTYPE html>
<html>
<head>
  <title>Wordly Dictionary SPA</title>
  <link rel="stylesheet" href="style.css">
  <script defer src="index.js"></script>
</head>

<body>

  <main>

    <h1>Wordly Dictionary</h1>

    <!-- Search Form -->
    <form id="search-form" aria-label="Search dictionary word">
      <input 
        type="text" 
        id="word-input" 
        placeholder="Enter a word"
        aria-label="Word input"
      />
      <button type="submit">Search</button>
    </form>

    <!-- Error Message -->
    <p id="error" role="alert"></p>

    <!-- Results Section -->
    <section id="results">
      <h2 id="word"></h2>
      <p id="phonetic"></p>
      <p id="definition"></p>
      <p id="synonyms"></p>

      <!-- Audio playback -->
      <audio id="audio" controls></audio>
    </section>

  </main>

</body>
</html>
